
<!DOCTYPE html>
<html>
<head>
    <title>Prototype Intelligence</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; }
        .input-section { display: flex; gap: 20px; margin-bottom: 20px; }
        .input-section textarea { width: 50%; height: 300px; padding: 10px; font-family: monospace; font-size: 12px; }
        button { background: #2563eb; color: white; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .status { margin: 10px 0; color: #666; font-style: italic; }
        .error { color: #dc2626; font-weight: bold; }

        /* Report Styling */
        .report { margin-top: 30px; }
        .card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .card h2 { margin-top: 0; color: #1e293b; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-right: 6px; }
        .badge-built { background: #dcfce7; color: #166534; }
        .badge-missed { background: #fee2e2; color: #991b1b; }
        .badge-redo { background: #fee2e2; color: #991b1b; }
        .badge-iterate { background: #fef9c3; color: #854d0e; }
        .badge-get_feedback { background: #dbeafe; color: #1e40af; }
        .badge-productionalize { background: #dcfce7; color: #166534; }
        .feature-item { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .feature-item:last-child { border-bottom: none; }
        .feature-name { font-weight: bold; }
        .feature-detail { color: #64748b; font-size: 14px; margin-top: 4px; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-top: 4px; }
        .tag-pm { background: #ede9fe; color: #5b21b6; }
        .tag-vibe { background: #fce7f3; color: #9d174d; }
        .tag-limitation { background: #f1f5f9; color: #475569; }
        .tag-from-doc { background: #dbeafe; color: #1e40af; }
        .tag-added { background: #fef3c7; color: #92400e; }

        /* Accordion for cost stages */
        .accordion { border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 8px; }
        .accordion-header { padding: 12px 16px; cursor: pointer; font-weight: bold; background: #f8fafc; }
        .accordion-header:hover { background: #f1f5f9; }
        .accordion-content { padding: 0 16px 12px; display: none; }
        .accordion.open .accordion-content { display: block; }
        .door-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .door-one-way { background: #fee2e2; color: #991b1b; }
        .door-two-way { background: #dcfce7; color: #166534; }

        /* Analyzing indicator */
        .analyzing-dot { display: inline-block; width: 8px; height: 8px; background: #2563eb; border-radius: 50%; animation: pulse 1s infinite; margin-left: 8px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <h1>Prototype Intelligence</h1>
    <p>Evaluate your vibe-coded prototype against your strategy</p>

    <div class="input-section">
        <textarea id="codebase" placeholder="Paste your codebase here..."></textarea>
        <textarea id="strategy" placeholder="Paste your strategy doc here (or leave empty)..."></textarea>
    </div>

    <button id="analyzeBtn" onclick="analyze()">Analyze</button>
    <div id="status" class="status"></div>
    <div id="report" class="report"></div>

    <script>
        async function analyze() {
            const codebase = document.getElementById("codebase").value;
            const strategy = document.getElementById("strategy").value;
            const status = document.getElementById("status");
            const report = document.getElementById("report");
            const btn = document.getElementById("analyzeBtn");

            if (!codebase.trim()) {
                status.innerHTML = '<span class="error">Please paste your codebase in the left box.</span>';
                return;
            }

            // Disable button, show simple analyzing message
            btn.disabled = true;
            status.innerHTML = 'Analyzing your prototype<span class="analyzing-dot"></span>';
            report.innerHTML = "";

            let fullText = "";

            try {
                const response = await fetch("/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ codebase, strategy })
                });

                if (!response.ok) {
                    const err = await response.json();
                    status.innerHTML = '<span class="error">Analysis failed: ' + (err.error || "Unknown error") + '</span>';
                    btn.disabled = false;
                    return;
                }

                // Read the stream silently — user just sees "Analyzing..."
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    fullText += decoder.decode(value, { stream: true });
                }

                // Stream complete — show results
                status.innerHTML = "";

                // Clean up markdown wrappers if present
                let cleaned = fullText.trim();
                if (cleaned.startsWith("```")) {
                    cleaned = cleaned.split("\n").slice(1).join("\n");
                }
                if (cleaned.endsWith("```")) {
                    cleaned = cleaned.slice(0, cleaned.lastIndexOf("```"));
                }

                const data = JSON.parse(cleaned.trim());

                if (data.error) {
                    status.innerHTML = '<span class="error">Analysis failed: ' + data.error + '</span>';
                    btn.disabled = false;
                    return;
                }

                // Render the report
                renderReport(data);

            } catch (e) {
                status.innerHTML = '<span class="error">Something went wrong. Please try again.</span>';
            }

            btn.disabled = false;
        }

        function renderReport(data) {
            const report = document.getElementById("report");
            let html = "";

            // Assessment card
            const rec = data.assessment.recommendation;
            html += '<div class="card">';
            html += '<h2>Assessment</h2>';
            html += '<span class="badge badge-built">' + data.assessment.built_count + ' features from doc/prompt built</span>';
            html += '<span class="badge badge-missed">' + data.assessment.missed_count + ' features from doc/prompt not built</span>';
            html += '<br><br>';
            html += '<span class="badge badge-' + rec.category + '">' + rec.category.replace("_", " ") + '</span> ';
            html += rec.detail;
            html += '</div>';

            // What was built
            html += '<div class="card">';
            html += '<h2>What Was Built</h2>';
            if (data.what_was_built && data.what_was_built.length > 0) {
                data.what_was_built.forEach(function(item) {
                    html += '<div class="feature-item">';
                    html += '<div class="feature-name">' + item.feature + '</div>';
                    html += '<div class="feature-detail">' + (item.where_in_product || "") + '</div>';
                    if (item.doc_or_prompt_reference) {
                        html += '<div class="feature-detail"><em>"' + item.doc_or_prompt_reference + '"</em></div>';
                    }
                    html += '<span class="tag ' + (item.from_doc ? 'tag-from-doc' : 'tag-added') + '">' + (item.from_doc ? 'from doc' : 'vibe code addition') + '</span>';
                    html += '</div>';
                });
            }
            html += '</div>';

            // What wasn't built
            html += '<div class="card">';
            html += '<h2>What Wasn\'t Built</h2>';
            if (data.what_wasnt_built && data.what_wasnt_built.length > 0) {
                data.what_wasnt_built.forEach(function(item) {
                    html += '<div class="feature-item">';
                    html += '<div class="feature-name">' + item.feature + '</div>';
                    html += '<div class="feature-detail">' + (item.what_to_do || "") + '</div>';
                    if (item.doc_or_prompt_reference) {
                        html += '<div class="feature-detail"><em>"' + item.doc_or_prompt_reference + '"</em></div>';
                    }
                    const tagClass = item.why_not_built === "needs_pm_decision" ? "tag-pm" : item.why_not_built === "vibe_code_miss" ? "tag-vibe" : "tag-limitation";
                    const tagLabel = item.why_not_built === "needs_pm_decision" ? "needs PM decision" : item.why_not_built === "vibe_code_miss" ? "vibe code miss" : "vibe coding limitation";
                    html += '<span class="tag ' + tagClass + '">' + tagLabel + '</span> ';
                    html += '<span class="tag ' + (item.from_doc ? 'tag-from-doc' : 'tag-added') + '">' + (item.from_doc ? 'from doc' : 'surfaced by analysis') + '</span>';
                    html += '</div>';
                });
            }
            html += '</div>';

            // Cost to next stage (accordion)
            if (data.cost_to_next_stage && data.cost_to_next_stage.stages) {
                html += '<div class="card">';
                html += '<h2>Cost to Next Stage</h2>';
                data.cost_to_next_stage.stages.forEach(function(stage) {
                    html += '<div class="accordion">';
                    html += '<div class="accordion-header" onclick="this.parentElement.classList.toggle(\'open\')">';
                    html += stage.stage.replace(/_/g, " ") + ' — ' + stage.effort;
                    html += '</div>';
                    html += '<div class="accordion-content">';
                    if (stage.items) {
                        stage.items.forEach(function(item) {
                            html += '<div class="feature-item">';
                            html += '<div class="feature-name">' + item.feature_or_gap + '</div>';
                            html += '<div class="feature-detail">Effort: ' + item.effort + '</div>';
                            if (item.tradeoff_or_simpler_option) {
                                html += '<div class="feature-detail">Tradeoff: ' + item.tradeoff_or_simpler_option + '</div>';
                            }
                            if (item.door_type && item.door_type !== "null") {
                                const doorClass = item.door_type === "one_way_door" ? "door-one-way" : "door-two-way";
                                const doorLabel = item.door_type === "one_way_door" ? "one-way door (decide carefully)" : "two-way door (decide fast)";
                                html += ' <span class="door-tag ' + doorClass + '">' + doorLabel + '</span>';
                            }
                            html += '</div>';
                        });
                    }
                    html += '</div></div>';
                });
                html += '</div>';
            }

            report.innerHTML = html;
        }
    </script>
</body>
</html>
